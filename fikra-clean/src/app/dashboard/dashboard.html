<div class="dashboard-container">
  <h2>Previous Ideas</h2>

  @for (idea of ideas; track idea.id) {
    <mat-card class="idea-card interactive-item">
      <mat-card-header>
        <mat-card-title>{{ idea.original_text }}</mat-card-title>
        <mat-card-subtitle>
          Submitted by {{ idea.username }} on {{ idea.submission_date | date:'short' }}
        </mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="classification-tag">
          {{ idea.ai_classification }}
        </div>
        <h3>Enhanced Proposal:</h3>
        <markdown class="enhanced-text" [data]="idea.ai_enhanced_text"></markdown>
      </mat-card-content>
    </mat-card>
  } @empty {
    <p class="empty-message">No ideas have been submitted yet. Be the first!</p>
  }
</div>
