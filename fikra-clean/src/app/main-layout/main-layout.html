<mat-toolbar class="app-header">
  <div class="logo-container">
    <img src="assets/Fikra_Logo.png" alt="Fikra App Logo" class="fikra-logo">
    <span i18n="Application name">Fikra</span>
  </div>
  <span class="header-spacer"></span>
  <img src="assets/SJC_Logo.png" alt="SJC Logo" class="sjc-logo">
</mat-toolbar>

<main class="content-area">
  <section class="submission-section">
    <app-idea-form (ideaSubmitted)="onIdeaSubmitted()"></app-idea-form>
  </section>
  <section class="dashboard-section">
    <app-dashboard></app-dashboard>
  </section>
</main>
