<div class="form-container">
  <!-- Main Title -->
  <h2>قدّم فكرة جديدة / Submit a New Idea</h2>

  <!-- Angular Material Form Field for a beautiful, styled text area -->
  <!-- 'appearance="fill"' gives it a solid background that fits our dark theme -->
  <mat-form-field appearance="fill" class="idea-textarea">
    <mat-label>Describe your idea, or use the microphone...</mat-label>

    <!-- The actual textarea. matInput connects it to Angular Material -->
    <textarea matInput
              rows="8"
              [(ngModel)]="ideaText"
              placeholder="For example: 'We should create a mobile app for lawyers to track case status.'"></textarea>

    <!-- The microphone button, styled as a suffix icon inside the text field -->
    <button mat-icon-button matSuffix (click)="toggleVoiceRecognition()"
            [class.recording]="isRecording"
            aria-label="Toggle voice recognition">
      <!-- The 'mic' icon from the Material Icons library -->
      <mat-icon>mic</mat-icon>
    </button>
  </mat-form-field>

  <!-- This text only appears when the microphone is active -->
  <div *ngIf="isRecording" class="listening-indicator">
    Listening... / جارٍ الاستماع...
  </div>

  <!-- The main submit button. color="accent" makes it use our Fikra Orange -->
  <!-- It is disabled while submitting to prevent double-clicks -->
  <button mat-raised-button color="accent" (click)="submit()" [disabled]="!ideaText.trim() || isSubmitting">
    <!-- Show different text on the button while the API call is in progress -->
    <span *ngIf="!isSubmitting">Submit & Enhance</span>
    <span *ngIf="isSubmitting">Submitting...</span>
  </button>
</div>
