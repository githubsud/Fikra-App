<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title i18n>Fikra Login</mat-card-title>
      <mat-card-subtitle i18n>Please enter your credentials</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form class="login-form">
        <mat-form-field appearance="fill">
          <mat-label i18n>Username</mat-label>
          <input matInput [(ngModel)]="loginData.username" name="username" required>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label i18n>Password</mat-label>
          <input matInput [(ngModel)]="loginData.password" type="password" name="password" required>
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="accent" (click)="login()" i18n>Login</button>
    </mat-card-actions>

    <!-- This footer is now placed correctly inside the card -->
    <mat-card-footer class="register-link">
      <a routerLink="/register" i18n>Don't have an account? Create one</a>
    </mat-card-footer>

  </mat-card>
</div>
