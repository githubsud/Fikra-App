<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title i18n>Create New Account</mat-card-title>
      <mat-card-subtitle i18n>Join Fikra to submit your ideas</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form class="register-form">
        <mat-form-field appearance="fill">
          <mat-label i18n>Username</mat-label>
          <input matInput [(ngModel)]="registerData.username" name="username" required>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label i18n>Department</mat-label>
          <input matInput [(ngModel)]="registerData.department" name="department" required>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label i18n>Password</mat-label>
          <input matInput [(ngModel)]="registerData.password" type="password" name="password" required>
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="accent" (click)="register()" i18n>Register</button>
    </mat-card-actions>
  </mat-card>
</div>
